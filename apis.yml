aid: augment-code
name: Augment Code
description: Augment Code is a context-aware AI platform for software engineering teams. The flagship is Cosmos, a "unified
  agents platform" for agentic software development at organizational scale, packaged as a set of specialized agents — Work
  Dispatcher (triages tickets), PR Author (drives tasks from first commit through merge), Pair Review and Deep Code Review
  (inline review feedback), and Tester (verification of changes end-to-end). The product also ships the Auggie CLI for local
  use and IDE plugins for Visual Studio Code and JetBrains. Augment is built around a proprietary Context Engine for codebase
  understanding and a unified agents runtime with scheduling, sandboxed execution, and human-in-the-loop escalation. Deployment
  options span local, managed cloud, customer cloud (AWS, GCP), and on-premises. As of this writing Augment does not advertise
  a public REST API — it is a product-led, partner-driven surface — so this profile documents the product surfaces and developer
  resources rather than endpoint shapes.
